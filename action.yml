name: "DeployGuard Security Scan"
description: >
  Runs DeployGuard static analysis on every PR, posts findings as a comment,
  uploads SARIF to GitHub Code Scanning, and blocks the workflow when score
  or severity thresholds are not met.

author: "DeployGuard"

branding:
  icon:  "shield"
  color: "blue"

inputs:

  api-url:
    description: Base URL of the DeployGuard API (no trailing slash).
    required: false
    default: "https://deployguard-kenrickwills-projects.vercel.app"

  api-token:
    description: >
      DeployGuard API token. Store as a repository secret named DEPLOYGUARD_TOKEN
      and reference it with secrets.DEPLOYGUARD_TOKEN in your workflow.
    required: true

  github-token:
    description: >
      GitHub token for PR comments and SARIF upload. Defaults to the built-in
      GITHUB_TOKEN. Override only if you need a PAT with extra permissions.
    required: false
    default: ""

  scan-path:
    description: Directory to scan (relative to repo root).
    required: false
    default: "."

  min-score:
    description: Minimum passing score (0–100).
    required: false
    default: "60"

  block-on:
    description: Comma-separated severities that block deployment (e.g. "critical,high").
    required: false
    default: "critical"

  post-pr-comment:
    description: Post a summary comment on the pull request.
    required: false
    default: "true"

  upload-sarif:
    description: Upload SARIF to GitHub Code Scanning.
    required: false
    default: "true"

  environment:
    description: Environment label (staging, production, etc.)
    required: false
    default: "staging"

  project-id:
    description: DeployGuard project ID (optional, persists results).
    required: false
    default: ""

outputs:

  scan-id:
    description: Unique ID of the completed scan.

  score:
    description: Overall security score (0–100).

  recommendation:
    description: "'deploy', 'review', or 'block'"

  gate-result:
    description: "'pass' or 'fail'"

  finding-count:
    description: Total number of findings.

  report-path:
    description: Local path to the JSON report artifact.

  sarif-id:
    description: Path to the uploaded SARIF file.

runs:
  using: "node20"
  main:  "packages/github-action/dist/index.js"
